<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聊天助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 85%;
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #2c3e66;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            display: flex;
            max-width: 80%;
        }
        .user {
            align-self: flex-end;
        }
        .assistant {
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 18px;
            border-radius: 24px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user .bubble {
            background: #2a5298;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant .bubble {
            background: #e9eef3;
            color: #1e2a3a;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            display: flex;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #ddd;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #ccc;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        #messageInput:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 2px rgba(42,82,152,0.2);
        }
        button {
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #1e3c72;
            transform: scale(1.02);
        }
        button:disabled {
            background: #9aaec0;
            cursor: not-allowed;
        }
        .typing {
            font-style: italic;
            color: #5a6e85;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 8px;
            background: #f0f2f5;
            color: #5f6c80;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">🤖 普通AI聊天助手 · GLM-4-Flash</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="问点什么..." autofocus>
        <button id="sendBtn">发送</button>
    </div>
    <footer>⚡ 流式响应 | 智谱AI驱动</footer>
</div>

<script>
    const API_URL = '/api/chat';
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, role) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = text.replace(/\n/g, '<br>');
        messageDiv.appendChild(bubble);
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return bubble;
    }

    let tempBubble = null;
    function setTyping(show) {
        if (show && !tempBubble) {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            const bubble = document.createElement('div');
            bubble.className = 'bubble typing';
            bubble.innerHTML = '✍️ 思考中...';
            typingDiv.appendChild(bubble);
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            tempBubble = bubble;
        } else if (!show && tempBubble) {
            tempBubble.parentElement?.remove();
            tempBubble = null;
        }
    }

    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;

        // 添加用户消息
        addMessage(message, 'user');
        input.value = '';
        sendBtn.disabled = true;
        input.disabled = true;
        setTyping(true);

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error || `HTTP ${response.status}`);
            }

            setTyping(false);
            const assistantBubble = addMessage('', 'assistant');
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let fullText = '';
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        fullText += data;
                        assistantBubble.innerHTML = fullText.replace(/\n/g, '<br>');
                        messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    }
                }
            }
            if (!fullText) assistantBubble.innerHTML = '😵 没有收到回答，请重试。';
        } catch (error) {
            setTyping(false);
            addMessage(`❌ 错误：${error.message}`, 'assistant');
        } finally {
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
